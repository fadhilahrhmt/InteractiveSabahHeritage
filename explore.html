<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SABAH ARCHIVE | Motion-Corrected Hub</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #080808;
            --surface: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --accent: #d4af37;
            --map-stroke: rgba(255, 255, 255, 0.5); /* Thicker/Brighter */
            --border: rgba(255, 255, 255, 0.15);
            --grid: rgba(212, 175, 55, 0.08);
            --font-main: 'Space Mono', monospace;
            --font-head: 'Syncopate', sans-serif;
        }

        [data-theme="light"] {
            --bg: #f9f7f2;
            --surface: rgba(0, 0, 0, 0.05);
            --text: #1a1a1a;
            --accent: #8b6e3c;
            --map-stroke: rgba(0, 0, 0, 0.4);
            --border: rgba(0, 0, 0, 0.1);
            --grid: rgba(0, 0, 0, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body { background-color: var(--bg); color: var(--text); font-family: var(--font-main); height: 100vh; overflow: hidden; display: flex; transition: background 0.4s; }

        .grid-overlay { position: fixed; inset: 0; background-image: linear-gradient(var(--grid) 1px, transparent 1px), linear-gradient(90deg, var(--grid) 1px, transparent 1px); background-size: 60px 60px; z-index: 1; pointer-events: none; }

        /* NAV BAR */
        .site-nav { position: fixed; top: 0; width: 100%; height: 80px; display: flex; justify-content: space-between; align-items: center; padding: 0 50px; background: var(--bg); border-bottom: 1px solid var(--border); z-index: 1000; }
        .logo-box h1 { font-family: var(--font-head); font-size: 14px; letter-spacing: 4px; }
        .nav-menu { display: flex; gap: 30px; list-style: none; }
        .nav-menu a { color: var(--text); text-decoration: none; font-size: 11px; opacity: 0.6; text-transform: uppercase; font-weight: 700; }
        .clock-box { font-size: 14px; font-weight: 700; color: var(--accent); border-left: 1px solid var(--border); padding-left: 20px; }

        /* SIDEBAR MONITOR */
        .sidebar { position: fixed; left: 0; top: 80px; bottom: 0; width: 340px; border-right: 1px solid var(--border); background: var(--surface); padding: 40px; z-index: 500; display: flex; flex-direction: column; gap: 30px; }
        .compass { width: 100px; height: 100px; border: 1px solid var(--accent); border-radius: 50%; align-self: center; position: relative; display: flex; align-items: center; justify-content: center; }
        .needle { width: 2px; height: 80px; background: var(--accent); transition: transform 0.1s ease-out; }
        
        .summary-card { background: rgba(212, 175, 55, 0.05); border: 1px solid var(--accent); padding: 20px; border-radius: 4px; font-size: 10px; line-height: 1.6; }

        /* MAP STAGE (MOTION FIXED) */
        .map-stage { flex: 1; display: flex; justify-content: center; align-items: center; padding-left: 340px; perspective: 1200px; }
        #map-svg { 
            width: 50vw; 
            max-width: 950px; 
            transform-style: preserve-3d; 
            transition: transform 0.15s ease-out; /* Smooth motion */
            overflow: visible;
        }

        .region { fill: rgba(255,255,255,0.02); stroke: var(--map-stroke); stroke-width: 5; transition: 0.3s; pointer-events: all; }
        .region:hover { fill: rgba(212, 175, 55, 0.2); stroke: var(--accent); stroke-width: 10; filter: drop-shadow(0 0 20px var(--accent)); }

        /* DATA HUD (IMAGE CUT FIX) */
        .data-hud { position: fixed; right: 40px; top: 120px; width: 420px; background: var(--bg); border: 1px solid var(--accent); opacity: 0; transform: translateY(20px); transition: 0.5s; z-index: 500; box-shadow: 15px 15px 0px var(--surface); }
        .data-hud.active { opacity: 1; transform: translateY(0); }
        
        .hud-img-wrap { 
            width: 100%; 
            height: 250px; /* Taller to prevent cutting */
            overflow: hidden;
            border-bottom: 1px solid var(--accent);
        }
        .hud-img { 
            width: 100%; 
            height: 100%; 
            background-size: cover; 
            background-position: center; 
            transition: 0.5s transform;
        }
        .data-hud:hover .hud-img { transform: scale(1.05); }

        .hud-content { padding: 30px; }
        .hud-content h2 { font-family: var(--font-head); font-size: 14px; color: var(--accent); margin-bottom: 10px; }
        .hud-content p { font-size: 11px; line-height: 1.8; opacity: 0.8; }

        /* CURSOR */
        #c { width: 8px; height: 8px; background: var(--accent); position: fixed; pointer-events: none; z-index: 2000; border-radius: 50%; }
        #cr { width: 40px; height: 40px; border: 1px solid var(--accent); position: fixed; pointer-events: none; z-index: 1999; border-radius: 50%; transition: 0.1s; }
    </style>
</head>
<body>

    <div id="c"></div><div id="cr"></div>
    <div class="grid-overlay"></div>

    <nav class="site-nav">
        <div class="logo-box"><h1>SABAH_HERITAGE</h1></div>
        <ul class="nav-menu">
            <li><a href="index.html">HOME</a></li>
            <li><a href="explore.html">EXPLORE</a></li>
            <li><a href="gallery.html">GALLERY</a></li>
            <li><a href="game.html">GAME</a></li>
            <li><a href="about.html">ABOUT</a></li>
        </ul>
        <div style="display:flex; align-items:center; gap:25px;">
            <button onclick="toggleTheme()" style="background:none; border:1px solid var(--accent); color:var(--accent); font-size:10px; padding:6px 15px;">SWAP_MODE</button>
            <div id="clock" class="clock-box">00:00:00</div>
        </div>
    </nav>

    <aside class="sidebar">
        <div class="compass"><div class="needle" id="needle"></div></div>
        
        <div class="summary-card">
            <strong style="color:var(--accent); letter-spacing:1px;">REGION SUMMARY</strong><br><br>
            • Kadazan-Dusun → West & Interior<br>
            • Bajau → Coastlines (West/East)<br>
            • Murut → Interior Highland<br>
            • Bugis → Tawau Sector<br>
            • Rungus → Kudat Sector
        </div>

        <div style="margin-top:auto; font-size:10px; border-left:3px solid var(--accent); padding-left:15px;">
            <span style="opacity:0.5">ACTIVE SECTOR:</span><br>
            <span id="sector-name" style="font-weight:700; color:var(--accent);">AWAITING SCAN</span>
        </div>
    </aside>

    <main class="map-stage">
        <svg id="map-svg" viewBox="0 0 800 600">
            <path class="region" data-title="NORTHERN ZONE" data-loc="Kudat, Kota Marudu, Pitas" data-ethnic="Rungus (Majority in Kudat)" data-img="https://mlup3e8wwmu8.i.optimole.com/w:1043/h:777/q:mauto/f:best/https://letstravelborneo.com/wp-content/uploads/2023/06/Schermafbeelding-2023-06-13-125239.png"
                d="M380,180 L420,70 L510,120 L480,220 Z" />

            <path class="region" data-title="WEST COAST ZONE" data-loc="KK, Penampang, Ranau, etc." data-ethnic="Kadazan-Dusun & Bajau Samah" data-img="https://cdn.bookatrekking.com/data/images/2020/02/shutterstock-586259927.jpg"
                d="M380,180 L480,220 L440,320 L350,420 L310,250 Z" />
            
            <path class="region" data-title="INTERIOR ZONE" data-loc="Keningau, Tenom, Nabawan" data-ethnic="Murut (Dominant Population)" data-img="https://sabahtourism.com/assets/uploads/RS528_LEE_0768E-1.jpg"
                d="M350,420 L230,490 L340,590 L450,460 L440,320 Z" />

            <path class="region" data-title="EAST COAST ZONE" data-loc="Sandakan, Kinabatangan" data-ethnic="Chinese & Local Coastal Tribes" data-img="https://www.clladventureborneo.com/wp-content/uploads/2025/11/sandakan-sabah-malaysia.jpg"
                d="M480,220 L510,120 L650,200 L720,300 L600,380 L440,320 Z" />

            <path class="region" data-title="NORTHEAST ZONE" data-loc="Tawau, Semporna, Lahad Datu" data-ethnic="Bugis & Bajau Laut (Sea Bajau)" data-img="https://www.ontourmalaysia.com/wp-content/uploads/2022/03/island-hopping-semporna-day-trip.jpg"
                d="M600,380 L720,300 L780,400 L700,560 L510,590 L450,460 L440,320 Z" />
        </svg>
    </main>

    <div class="data-hud" id="hud">
        <div class="hud-img-wrap">
            <div class="hud-img" id="hud-img"></div>
        </div>
        <div class="hud-content">
            <h2 id="hud-title">SCANNING...</h2>
            <p id="hud-loc" style="color:var(--accent); font-weight:700; margin-bottom:10px;"></p>
            <p id="hud-ethnic"></p>
        </div>
    </div>

    <script>
        const map = document.getElementById('map-svg');
        const needle = document.getElementById('needle');
        const hud = document.getElementById('hud');
        const clock = document.getElementById('clock');

        function updateClock() {
            clock.innerText = new Date().toLocaleTimeString('en-GB', { hour12: false });
        }
        setInterval(updateClock, 1000);

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            document.documentElement.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
        }

        // MOTION & CURSOR ENGINE
        document.addEventListener('mousemove', (e) => {
            document.getElementById('c').style.left = e.clientX + 'px';
            document.getElementById('c').style.top = e.clientY + 'px';
            document.getElementById('cr').style.left = (e.clientX - 20) + 'px';
            document.getElementById('cr').style.top = (e.clientY - 20) + 'px';
            
            // Map Tilt Math
            const xVal = (window.innerHeight / 2 - e.clientY) / 40;
            const yVal = (window.innerWidth / 2 - e.clientX) / 40;
            map.style.transform = `rotateX(${xVal}deg) rotateY(${-yVal}deg)`;
            
            // Compass Needle Math
            needle.style.transform = `rotate(${-yVal * 8}deg)`;
        });

        // REGION HOVER ENGINE
        document.querySelectorAll('.region').forEach(r => {
            r.addEventListener('mouseenter', () => {
                document.getElementById('hud-title').innerText = r.dataset.title;
                document.getElementById('hud-loc').innerText = "📍 " + r.dataset.loc;
                document.getElementById('hud-ethnic').innerText = "ETHNICITY: " + r.dataset.ethnic;
                document.getElementById('hud-img').style.backgroundImage = `url('${r.dataset.img}')`;
                document.getElementById('sector-name').innerText = r.dataset.title;
                hud.classList.add('active');
            });
            r.addEventListener('mouseleave', () => {
                hud.classList.remove('active');
                document.getElementById('sector-name').innerText = "AWAITING SCAN";
            });
        });
    </script>
</body>
</html>
